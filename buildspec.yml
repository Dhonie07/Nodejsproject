version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - API_IMAGE_TAG=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/safemeet-api:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - WEB_IMAGE_TAG=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/safemeet-web:$CODEBUILD_RESOLVED_SOURCE_VERSION

  build:
    commands:
      - echo Building API Docker image...
      - docker build --target api -t $API_IMAGE_TAG .
      - echo Building Web Docker image...
      - docker build --target web -t $WEB_IMAGE_TAG .

  post_build:
    commands:
      - echo Pushing API image to ECR...
      - docker push $API_IMAGE_TAG
      - echo Pushing Web image to ECR...
      - docker push $WEB_IMAGE_TAG
      - echo Build completed successfully!
      - printf '[{"name":"safemeet-api","imageUri":"%s"},{"name":"safemeet-web","imageUri":"%s"}]' $API_IMAGE_TAG $WEB_IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - appspec.yml
    - scripts/**/*
